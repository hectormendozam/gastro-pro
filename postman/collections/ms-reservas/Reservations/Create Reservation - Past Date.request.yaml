$kind: http-request
method: POST
url: '{{base_url_reservas}}/api/reservations'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "fullName": "Juan Pérez",
      "email": "juan@example.com",
      "phone": "5512345678",
      "peopleCount": 2,
      "date": "2000-01-01",
      "time": "14:00",
      "zone": "interior"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 400', () => { pm.response.to.have.status(400); });
      pm.test('Success is false', () => { const json = pm.response.json(); pm.expect(json.success).to.eql(false); });
      pm.test('Message includes pasada', () => { const json = pm.response.json(); pm.expect(json.message).to.include('pasada'); });
