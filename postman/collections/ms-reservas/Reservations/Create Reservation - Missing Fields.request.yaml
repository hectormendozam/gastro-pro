$kind: http-request
method: POST
url: '{{base_url_reservas}}/api/reservations'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "fullName": "Juan Pérez"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 400', () => { pm.response.to.have.status(400); });
      pm.test('Success is false', () => { const json = pm.response.json(); pm.expect(json.success).to.eql(false); });
