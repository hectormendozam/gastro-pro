$kind: http-request
method: POST
url: '{{base_url_reservas}}/api/reservations'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "fullName": "Juan Pérez",
      "email": "juan@example.com",
      "phone": "5512345678",
      "peopleCount": 2,
      "date": "2099-12-31",
      "time": "14:00",
      "zone": "interior"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 201', () => { pm.response.to.have.status(201); });
      pm.test('Success is true', () => { const json = pm.response.json(); pm.expect(json.success).to.eql(true); });
      pm.test('Data has reservationNumber', () => { const json = pm.response.json(); pm.expect(json.data).to.have.property('reservationNumber'); });
      pm.test('Save reservationId', () => { const json = pm.response.json(); if (json.data && json.data.id) { pm.collectionVariables.set('reservationId', json.data.id); } });
