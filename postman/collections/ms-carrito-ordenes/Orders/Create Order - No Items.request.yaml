$kind: http-request
method: POST
url: '{{base_url_carrito}}/api/orders'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "items": [],
      "pickupTime": "14:00"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 400', () => { pm.response.to.have.status(400); });
      pm.test('Error message present', () => { const json = pm.response.json(); pm.expect(json.success).to.be.false; pm.expect(json.message).to.include('platillo'); });
