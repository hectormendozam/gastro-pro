$kind: http-request
method: GET
url: '{{base_url_carrito}}/api/orders/{{orderId}}'
order: 6000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 200 or 404', () => { pm.expect(pm.response.code).to.be.oneOf([200, 404]); });
      if (pm.response.code === 200) { pm.test('Order data returned', () => { const json = pm.response.json(); pm.expect(json.success).to.be.true; pm.expect(json.data).to.have.property('orderNumber'); }); }
