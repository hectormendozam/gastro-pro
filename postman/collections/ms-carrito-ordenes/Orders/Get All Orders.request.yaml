$kind: http-request
method: GET
url: '{{base_url_carrito}}/api/orders'
order: 5000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 200', () => { pm.response.to.have.status(200); });
      pm.test('Returns array of orders', () => { const json = pm.response.json(); pm.expect(json.success).to.be.true; pm.expect(json.data).to.be.an('array'); pm.expect(json).to.have.property('count'); });
