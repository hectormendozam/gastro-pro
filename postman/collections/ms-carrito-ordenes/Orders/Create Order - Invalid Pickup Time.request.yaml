$kind: http-request
method: POST
url: '{{base_url_carrito}}/api/orders'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "items": [{ "dishId": 1, "name": "Tacos al Pastor", "price": 85, "quantity": 2, "subtotal": 170 }],
      "pickupTime": "23:00"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 400', () => { pm.response.to.have.status(400); });
      pm.test('Pickup time error', () => { const json = pm.response.json(); pm.expect(json.success).to.be.false; pm.expect(json.message).to.include('recogida'); });
