$kind: http-request
method: POST
url: '{{base_url_contacto}}/api/contact'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "nombre": "María García",
      "correo": "maria@example.com",
      "mensaje": "Me gustaría hacer una reservación para 4 personas este fin de semana."
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 201", function () {
        pm.response.to.have.status(201);
      });

      pm.test("Response success is true", function () {
        const json = pm.response.json();
        pm.expect(json.success).to.be.true;
      });

      pm.test("Response data has id", function () {
        const json = pm.response.json();
        pm.expect(json.data).to.have.property('id');
      });

      pm.test("Response data.nombre equals 'María García'", function () {
        const json = pm.response.json();
        pm.expect(json.data.nombre).to.eql('María García');
      });
