$kind: http-request
method: POST
url: '{{base_url_contacto}}/api/contact'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400", function () {
        pm.response.to.have.status(400);
      });

      pm.test("Response success is false", function () {
        const json = pm.response.json();
        pm.expect(json.success).to.be.false;
      });

      pm.test("Message includes 'obligatorios'", function () {
        const json = pm.response.json();
        pm.expect(json.message).to.include('obligatorios');
      });
